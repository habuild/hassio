---
# yamllint disable rule:line-length
name: HA-Build

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths: ["pushed"]
    tags:
      - '*'
  release:
    types: [published]

env:
  IMAGE_NAME: hassio/haos-sbfspot
  ARCHITECTURES: '["amd64", "aarch64"]'
  ARG: BUILD_VERSION
  ver_tag: "${BUILD_VERSION}"

permissions:
  contents: read

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      label: ${{ steps.get_yaml_label.outputs.label }}
    steps:
      - uses: actions/checkout@v7

      #- name: Extract Label from YAML   ### version config.yaml  
      #  id: get_yaml_label
      #  run: |
      #      # Uses yq (pre-installed on GitHub runners) to parse the yaml file
      #      LABEL=$(yq -r '.version' /haos-sbfspot/config.yaml)
      #      echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      #- name: Use Extracted Label
      #  run: |
      #    echo "The extracted label is ${{ steps.get_yaml_label.outputs.label }}"

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read   # To check out the code
      id-token: write   # Write needed for Cosign signing (issue OIDC token for signing)
      packages: write   # To push built images to GitHub Container Registry
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          #context: ./hassio/hassio   ### repo folder only needed if repo-folder/app-folder
          #file: ./haos-sbfspot/Dockerfile  ### App/Addon folder git submodule add to fix
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            2026.06.1
            latest
          push: "true"
          version: 2026.06.1   ### ${{ github.event.release.tag_name }}" for published events or github.ref_name?? for push

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Write needed for Cosign signing (issue OIDC token for signing)
      packages: write   # To push the manifest to GitHub Container Registry
    steps:
      - uses: actions/checkout@v7
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            
            latest
            2026.06.1
